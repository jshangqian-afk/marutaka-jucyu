<!DOCTYPE html>
<html lang="ja">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>丸高秋山 受注予想・実績管理</title>
<style>
  :root {
    --bg: #f3f4f6;
    --card: #ffffff;
    --ink: #1f2933;
    --muted: #6b7280;
    --line: #e2e6eb;
    --accent: #2563eb;
    --accent-ink: #ffffff;
    --over: #15803d;      /* 実績 > 予想 */
    --under: #b91c1c;     /* 実績 < 予想 */
    --warn: #dc2626;
    --warn-bg: #fef2f2;
    --landing: #b45309;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    padding: 0 0 110px;
    -webkit-text-size-adjust: 100%;
  }
  header {
    background: #111827;
    color: #fff;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  header h1 { font-size: 1.15rem; margin: 0; font-weight: 700; }
  .banner {
    font-size: 0.78rem;
    padding: 3px 10px;
    border-radius: 999px;
    background: #f59e0b;
    color: #111827;
    font-weight: 700;
  }
  .banner.live { background: #10b981; color: #062a1c; }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }

  /* タブ */
  .tabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .tab {
    flex: 1 1 120px;
    padding: 14px 10px;
    border: 2px solid var(--line);
    background: var(--card);
    border-radius: 12px;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: .12s;
  }
  .tab.active { border-color: var(--accent); background: var(--accent); color: var(--accent-ink); }

  /* コントロール行 */
  .controls {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .controls label { font-weight: 700; font-size: .95rem; }
  input[type="month"] {
    font-size: 1.05rem; padding: 10px 12px; border: 2px solid var(--line);
    border-radius: 10px; background: #fff; min-height: 46px;
  }
  .btn {
    font-size: .95rem; font-weight: 700; padding: 11px 16px; border-radius: 10px;
    border: 2px solid var(--line); background: #fff; color: var(--ink); cursor: pointer;
    min-height: 46px;
  }
  .btn.ghost { background: #fff; }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.danger { background: #fff; color: var(--warn); border-color: var(--warn); }
  .btn:active { transform: translateY(1px); }
  .btn.small { padding: 8px 12px; min-height: 0; font-size: .85rem; }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px; margin-bottom: 16px;
  }
  .card h2 { margin: 0 0 10px; font-size: 1.0rem; }

  /* メインテーブル */
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid var(--line); }
  thead th {
    font-size: .8rem; color: var(--muted); font-weight: 700;
    position: sticky; top: 56px; background: var(--card); z-index: 5;
  }
  .day-cell { font-weight: 700; text-align: left; padding-left: 12px; white-space: nowrap; }
  .fc-cell { color: var(--muted); font-variant-numeric: tabular-nums; min-width: 64px; }
  td.diff { font-weight: 700; font-variant-numeric: tabular-nums; min-width: 70px; }
  td.diff.over { color: var(--over); }
  td.diff.under { color: var(--under); }
  td.diff.zero { color: var(--muted); }
  td.diff.none { color: #cbd5e1; }
  input.actual {
    width: 90px; font-size: 1.1rem; text-align: right; padding: 9px 10px;
    border: 2px solid var(--line); border-radius: 9px; font-variant-numeric: tabular-nums;
  }
  input.actual:focus { outline: none; border-color: var(--accent); }
  input.actual.filled { background: #eff6ff; border-color: #bfdbfe; }

  /* フッター集計 */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 14px; }
  .stat {
    background: #f8fafc; border: 1px solid var(--line); border-radius: 12px;
    padding: 12px; text-align: center;
  }
  .stat .label { font-size: .78rem; color: var(--muted); font-weight: 700; }
  .stat .value { font-size: 1.5rem; font-weight: 800; font-variant-numeric: tabular-nums; margin-top: 4px; }
  .stat.landing { background: #fffbeb; border-color: #fde68a; }
  .stat.landing .value { color: var(--landing); }
  .stat.progress .value { font-size: 1.25rem; }
  .progress-bar { height: 6px; background: #e5e7eb; border-radius: 4px; margin-top: 8px; overflow: hidden; }
  .progress-bar > span { display: block; height: 100%; background: var(--accent); width: 0; transition: width .2s; }

  /* サマリー */
  .summary-table th, .summary-table td { text-align: right; }
  .summary-table th:first-child, .summary-table td:first-child { text-align: left; font-weight: 700; }
  .summary-table td.land { color: var(--landing); font-weight: 800; }

  /* マスター編集 */
  #masterPanel input.mst {
    width: 76px; font-size: 1rem; text-align: right; padding: 8px; border: 2px solid var(--line);
    border-radius: 8px; font-variant-numeric: tabular-nums;
  }
  .master-actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

  /* 保存バー */
  .savebar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
    background: rgba(255,255,255,.97); border-top: 1px solid var(--line);

  #saveBtn.dirty { background: var(--warn); border-color: var(--warn); color: #fff; animation: blink 1s infinite; }

  /* トースト */
  #toast {
    position: fixed; left: 50%; bottom: 92px; transform: translateX(-50%) translateY(20px);

  .muted { color: var(--muted); font-size: .85rem; }
  [hidden] { display: none !important; }

    .stats { grid-template-columns: repeat(2, 1fr); }
    input.actual { width: 78px; }

    </div>
  </div>
</div>

async function apiGet(params) {
  if (OFFLINE) return offlineGet(params);
  const url = API_URL + "?" + new URLSearchParams(params).toString();
  const res = await fetch(url, { method: "GET" });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || "取得に失敗しました");
  return json.data;
}

async function apiPost(payload) {
  if (OFFLINE) return offlinePost(payload);
  // 既存アプリと同方式: text/plain で POST（CORS プリフライト回避）
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || "保存に失敗しました");
  return json.data;
}

function offlineGet(params) {
  if (params.action === "master") {
    return JSON.parse(JSON.stringify(LOCAL_MASTER));
  }
  if (params.action === "actuals") {
    const ym = params.yyyymm || "";
    return LOCAL_ACTUALS
      .filter(r => !ym || r.yyyymm === ym)
      .map(r => {
        const rec = { yyyymm: r.yyyymm, product: r.product, "週合計": 0, "更新日時": r["更新日時"] || "" };
        let total = 0;
        DAYS.forEach(d => {
          const v = (r[d] === undefined || r[d] === null || r[d] === "") ? null : Number(r[d]);
          rec[d] = v;
          if (v !== null) total += v;
        });
        rec["週合計"] = total;
        return rec;
      });
  }
  return null;
}

function offlinePost(payload) {
  if (payload.action === "saveActuals") {
    const { yyyymm, product, values } = payload;
    let total = 0;
    const rec = { yyyymm, product };
    DAYS.forEach(d => {
      const raw = values[d];
      const v = (raw === undefined || raw === null || raw === "") ? null : Number(raw);
      rec[d] = v;
      if (v !== null) total += v;
    });
    rec["週合計"] = total;
    rec["更新日時"] = nowStr();
    const idx = LOCAL_ACTUALS.findIndex(r => r.yyyymm === yyyymm && r.product === product);
    if (idx >= 0) LOCAL_ACTUALS[idx] = rec; else LOCAL_ACTUALS.push(rec);
    return { yyyymm, product, "週合計": total, "更新日時": rec["更新日時"] };
  }
  if (payload.action === "saveMaster") {
    LOCAL_MASTER = JSON.parse(JSON.stringify(payload.master));
    return JSON.parse(JSON.stringify(LOCAL_MASTER));
  }
  if (payload.action === "recalcForecast") {
    const sums = {}, counts = {};
    PRODUCTS.forEach(p => { sums[p] = {}; counts[p] = {}; DAYS.forEach(d => { sums[p][d] = 0; counts[p][d] = 0; }); });
    LOCAL_ACTUALS.forEach(r => {
      const p = r.product;
      if (!sums[p]) { sums[p] = {}; counts[p] = {}; DAYS.forEach(d => { sums[p][d] = 0; counts[p][d] = 0; }); }
      DAYS.forEach(d => {
        const v = r[d];
        if (v !== null && v !== "" && v !== undefined && !isNaN(Number(v))) { sums[p][d] += Number(v); counts[p][d]++; }
      });
    });
    const master = {};
    Object.keys(sums).forEach(p => {
      master[p] = {};
      DAYS.forEach(d => { master[p][d] = counts[p][d] > 0 ? Math.round(sums[p][d] / counts[p][d]) : 0; });
    });
    LOCAL_MASTER = master;
    return JSON.parse(JSON.stringify(LOCAL_MASTER));
  }
  return null;
}

/* =========================================================================
 *  状態
 * ========================================================================= */
const state = {
  product: PRODUCTS[0],
  yyyymm: currentYm(),
  master: {},            // { 商品: { 曜日: 数値 } }
  monthRecords: [],      // 選択年月の実績レコード配列（両商品）
  actual: {},            // 現在の商品×年月の入力値 { 曜日: 数値|null }
  updatedAt: "",
  dirty: false,
  editMode: false
};

/* =========================================================================
 *  ユーティリティ
 * ========================================================================= */
function currentYm() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}
function nowStr() {
  const d = new Date();
  const p = n => String(n).padStart(2, "0");
  return d.getFullYear() + "-" + p(d.getMonth()+1) + "-" + p(d.getDate()) + " " + p(d.getHours()) + ":" + p(d.getMinutes()) + ":" + p(d.getSeconds());
}
function fmt(n) { return (n === null || n === undefined || isNaN(n)) ? "—" : Number(n).toLocaleString("ja-JP"); }
function parseInput(v) {
  if (v === null || v === undefined) return null;
  const s = String(v).trim();
  if (s === "") return null;
  const n = Number(s);
  return isNaN(n) ? null : n;
}

/* =========================================================================
 *  集計ロジック
 * ========================================================================= */
function computeStats(forecast, actualMap) {
  let fSum = 0, aSum = 0, entered = 0, landing = 0;
  DAYS.forEach(d => {
    const f = Number(forecast && forecast[d]) || 0;
    fSum += f;
    const a = actualMap[d];
    if (a !== null && a !== undefined && a !== "") {
      aSum += Number(a);
      landing += Number(a);
      entered++;
    } else {
      landing += f;   // 未入力の曜日は予想値で補完
    }
  });
  return { fSum, aSum, entered, landing };
}

// 商品ごとの実績マップ（現在商品はライブの state.actual、他商品は保存済みレコード）
function actualMapFor(product) {
  if (product === state.product) return state.actual;
  const rec = state.monthRecords.find(r => r.product === product);
  const m = {};
  DAYS.forEach(d => { m[d] = (rec && rec[d] !== null && rec[d] !== undefined) ? rec[d] : null; });
  return m;
}

/* =========================================================================
 *  描画
 * ========================================================================= */
function renderTabs() {
  const el = document.getElementById("productTabs");
  el.innerHTML = "";
  PRODUCTS.forEach(p => {
    const b = document.createElement("button");
    b.className = "tab" + (p === state.product ? " active" : "");
    b.textContent = p;
    b.type = "button";
    b.addEventListener("click", () => switchProduct(p));
    el.appendChild(b);
  });
}

function renderTable() {
  document.getElementById("mainTitle").textContent = state.product + " 実績入力（" + state.yyyymm + "）";
  const forecast = state.master[state.product] || {};
  const body = document.getElementById("mainBody");
  body.innerHTML = "";

  DAYS.forEach(d => {
    const tr = document.createElement("tr");

    const tdDay = document.createElement("td");
    tdDay.className = "day-cell";
    tdDay.textContent = d;

    const tdFc = document.createElement("td");
    tdFc.className = "fc-cell";
    tdFc.textContent = fmt(Number(forecast[d]) || 0);

    const tdIn = document.createElement("td");
    const inp = document.createElement("input");
    inp.className = "actual";
    inp.type = "text";
    inp.inputMode = "numeric";
    inp.setAttribute("pattern", "[0-9]*");
    inp.dataset.day = d;
    const val = state.actual[d];
    inp.value = (val === null || val === undefined) ? "" : val;
    if (inp.value !== "") inp.classList.add("filled");
    inp.addEventListener("input", onActualInput);
    tdIn.appendChild(inp);

    const tdDiff = document.createElement("td");
    tdDiff.className = "diff";
    tdDiff.dataset.day = d;

    tr.append(tdDay, tdFc, tdIn, tdDiff);
    body.appendChild(tr);

    updateDiffCell(d);
  });

  updateFooter();
}

function updateDiffCell(day) {
  const cell = document.querySelector('#mainBody td.diff[data-day="' + day + '"]');
  if (!cell) return;
  const forecast = state.master[state.product] || {};
  const f = Number(forecast[day]) || 0;
  const a = state.actual[day];
  cell.classList.remove("over", "under", "zero", "none");
  if (a === null || a === undefined || a === "") {
    cell.textContent = "—";
    cell.classList.add("none");
    return;
  }
  const diff = Number(a) - f;
  cell.textContent = (diff > 0 ? "+" : "") + diff.toLocaleString("ja-JP");
  cell.classList.add(diff > 0 ? "over" : (diff < 0 ? "under" : "zero"));
}

function updateFooter() {
  const forecast = state.master[state.product] || {};
  const s = computeStats(forecast, state.actual);
  document.getElementById("stForecast").textContent = fmt(s.fSum);
  document.getElementById("stActual").textContent = fmt(s.aSum);
  document.getElementById("stLanding").textContent = fmt(s.landing);
  document.getElementById("stProgress").textContent = s.entered + "/7";
  document.getElementById("progressFill").style.width = Math.round(s.entered / 7 * 100) + "%";
  const upd = document.getElementById("updatedAt");
  upd.textContent = state.updatedAt ? ("最終更新: " + state.updatedAt) : "";
}

function renderSummary() {
  document.getElementById("summaryMonth").textContent = state.yyyymm;
  const body = document.getElementById("summaryBody");
  body.innerHTML = "";
  PRODUCTS.forEach(p => {
    const forecast = state.master[p] || {};
    const s = computeStats(forecast, actualMapFor(p));
    const tr = document.createElement("tr");
    const cells = [
      p,
      fmt(s.fSum),
      fmt(s.aSum),
      fmt(s.landing),
      s.entered + "/7"
    ];
    cells.forEach((c, i) => {
      const td = document.createElement("td");
      td.textContent = c;
      if (i === 3) td.className = "land";
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });
}

function renderMaster() {
  const body = document.getElementById("masterBody");
  body.innerHTML = "";
  PRODUCTS.forEach(p => {
    const tr = document.createElement("tr");
    const tdName = document.createElement("td");
    tdName.className = "day-cell";
    tdName.textContent = p;
    tr.appendChild(tdName);

    DAYS.forEach(d => {
      const td = document.createElement("td");
      const inp = document.createElement("input");
      inp.className = "mst";
      inp.type = "text";
      inp.inputMode = "numeric";
      inp.dataset.product = p;
      inp.dataset.day = d;
      inp.value = Number((state.master[p] || {})[d]) || 0;
      inp.addEventListener("input", updateMasterTotals);
      td.appendChild(inp);
      tr.appendChild(td);
    });

    const tdTotal = document.createElement("td");
    tdTotal.className = "fc-cell mst-total";
    tdTotal.dataset.product = p;
    tr.appendChild(tdTotal);

    body.appendChild(tr);
  });
  updateMasterTotals();
}

function updateMasterTotals() {
  PRODUCTS.forEach(p => {
    let sum = 0;
    document.querySelectorAll('#masterBody input.mst[data-product="' + p + '"]').forEach(inp => {
      sum += parseInput(inp.value) || 0;
    });
    const cell = document.querySelector('#masterBody td.mst-total[data-product="' + p + '"]');
    if (cell) cell.textContent = fmt(sum);
  });
}

/* =========================================================================
 *  保存バー / トースト
 * ========================================================================= */
function markDirty(dirty) {
  state.dirty = dirty;
  const bar = document.getElementById("saveBar");
  const btn = document.getElementById("saveBtn");
  const status = document.getElementById("saveStatus");
  if (dirty) {
    bar.classList.add("dirty");
    btn.classList.add("dirty");
    status.textContent = "未保存の変更があります";
  } else {
    bar.classList.remove("dirty");
    btn.classList.remove("dirty");
    status.textContent = "変更はありません";
  }
}

let toastTimer = null;
function toast(msg, isErr) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "show" + (isErr ? " err" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ""; }, 2600);
}

/* =========================================================================
 *  イベント
 * ========================================================================= */
function onActualInput(e) {
  const day = e.target.dataset.day;
  const v = parseInput(e.target.value);
  state.actual[day] = v;
  e.target.classList.toggle("filled", e.target.value.trim() !== "");
  updateDiffCell(day);
  updateFooter();
  renderSummary();   // 全体サマリーもライブ追従
  markDirty(true);
}

async function switchProduct(p) {
  if (p === state.product) return;
  if (state.dirty && !confirm("未保存の実績があります。破棄して切り替えますか？")) return;
  state.product = p;
  renderTabs();
  setActualFromRecords();
  markDirty(false);
  renderTable();
  renderSummary();
}

async function onMonthChange(e) {
  const ym = e.target.value;
  if (!ym) return;
  if (state.dirty && !confirm("未保存の実績があります。破棄して切り替えますか？")) {
    e.target.value = state.yyyymm;
    return;
  }
  state.yyyymm = ym;
  await loadMonth();
  markDirty(false);
  renderTable();
  renderSummary();
}

function setActualFromRecords() {
  const rec = state.monthRecords.find(r => r.product === state.product);
  state.actual = {};
  DAYS.forEach(d => { state.actual[d] = (rec && rec[d] !== null && rec[d] !== undefined) ? rec[d] : null; });
  state.updatedAt = (rec && rec["更新日時"]) ? rec["更新日時"] : "";
}

async function loadMaster() {
  state.master = await apiGet({ action: "master" });
}

async function loadMonth() {
  state.monthRecords = await apiGet({ action: "actuals", yyyymm: state.yyyymm });
  setActualFromRecords();
}

async function saveActuals() {
  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  try {
    const values = {};
    DAYS.forEach(d => { values[d] = state.actual[d]; });
    await apiPost({ action: "saveActuals", yyyymm: state.yyyymm, product: state.product, values });
    await loadMonth();              // 保存後に再取得して整合
    markDirty(false);
    renderTable();
    renderSummary();
    toast("保存しました ✓");
  } catch (err) {
    toast("保存に失敗: " + err.message, true);
  } finally {
    btn.disabled = false;
  }
}

async function saveMaster() {
  const master = {};
  PRODUCTS.forEach(p => {
    master[p] = {};
    DAYS.forEach(d => {
      const inp = document.querySelector('#masterBody input.mst[data-product="' + p + '"][data-day="' + d + '"]');
      master[p][d] = parseInput(inp.value) || 0;
    });
  });
  try {
    state.master = await apiPost({ action: "saveMaster", master });
    renderTable();
    renderSummary();
    renderMaster();
    toast("予想マスターを保存しました ✓");
  } catch (err) {
    toast("保存に失敗: " + err.message, true);
  }
}

async function recalcForecast() {
  if (!confirm("全実績の曜日別平均で予想マスターを再計算し、上書きします。よろしいですか？")) return;
  try {
    state.master = await apiPost({ action: "recalcForecast" });
    renderTable();
    renderSummary();
    renderMaster();
    toast("実績から再計算しました ✓");
  } catch (err) {
    toast("再計算に失敗: " + err.message, true);
  }
}

function toggleEditMode() {
  state.editMode = !state.editMode;
  const panel = document.getElementById("masterPanel");
  panel.hidden = !state.editMode;
  document.getElementById("editToggle").textContent = state.editMode ? "編集を閉じる" : "予想マスター編集";
  if (state.editMode) {
    renderMaster();
    panel.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

/* =========================================================================
 *  初期化
 * ========================================================================= */
function setBanner() {
  const b = document.getElementById("modeBanner");
  if (OFFLINE) {
    b.textContent = "デモモード（API_URL 未設定）";
    b.className = "banner";
  } else {
    b.textContent = "接続中";
    b.className = "banner live";
  }
}

async function init() {
  setBanner();
  const monthSel = document.getElementById("monthSel");
  monthSel.value = state.yyyymm;
  monthSel.addEventListener("change", onMonthChange);
  document.getElementById("editToggle").addEventListener("click", toggleEditMode);
  document.getElementById("saveBtn").addEventListener("click", saveActuals);
  document.getElementById("saveMasterBtn").addEventListener("click", saveMaster);
  document.getElementById("recalcBtn").addEventListener("click", recalcForecast);
  window.addEventListener("beforeunload", e => {
    if (state.dirty) { e.preventDefault(); e.returnValue = ""; }
  });

  renderTabs();
  markDirty(false);

  try {
    await loadMaster();
    await loadMonth();
    renderTable();
    renderSummary();
  } catch (err) {
    toast("読み込みに失敗: " + err.message, true);
    document.getElementById("mainTitle").textContent = "読み込みエラー";
  }
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
